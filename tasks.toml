[meta]
title = "Strands WASM"
baseline = "2026-01-15"
authors = ["chaynabors"]
summary = """
All work so far by 1 engineer over ~9 weeks. Integration tests and \
typescript work are independently parallelizable. Repository and \
distribution work is sequential. 3-4 engineers could close the \
remaining work in 6-8 weeks. Beyond 4 the gains are marginal."""

[groups.infrastructure]
description = "Build system, tooling, and developer experience."

[groups.mono]
description = "Work that crosses the WASM boundary: WIT contract, bridge, Rust host."

[groups.python]
description = "Python SDK wrapper."

[groups.typescript]
description = "Features that need to be built in the TS SDK first."

[groups.session]
description = "Session persistence across agent invocations."

[groups.integration-tests]
description = "Failures in the upstream Python integration test suite."

[groups.distribution]
description = "Packaging and publishing SDKs to registries."

[groups.repository]
description = "Monorepo structure, versioning, and CI."

[groups.exploratory]
description = "Investigations that may change the architecture."

